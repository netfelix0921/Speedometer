<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CyclePilot">
<meta name="theme-color" content="#050505">
<meta name="description" content="Retro digital speedometer cycling computer">
<title>CyclePilot</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
/* =============================================
   CSS VARIABLES
   ============================================= */
:root {
  --primary:   #C8C8C8;
  --secondary: #707070;
  --dim:       #3a3a3a;
  --bg:        #050505;
  --bg2:       #0a0a0a;
  --panel-bg:  #080808;
  --warning:   #FFB000;
  --alert:     #FF4040;
  --border:    rgba(180,180,180,0.15);
  --glow:      rgba(200,200,200,0.30);
  --glow-sm:   rgba(200,200,200,0.12);
  --text:      #d8d8d8;
  --text-dim:  #4a4a4a;
  --font-d:    'Orbitron', monospace;
  --font-vt:   'VT323', monospace;
  --font-m:    'Share Tech Mono', monospace;
  --needle-speed: 0.6s;
}

*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-m);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* =============================================
   CRT OVERLAY — full-screen texture
   ============================================= */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
  pointer-events: none;
  z-index: 9998;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
  z-index: 9997;
}

/* =============================================
   SCAN LINE
   ============================================= */
.scan-line {
  position: fixed; top:0; left:0; right:0;
  height: 3px;
  background: rgba(200,200,200,0.05);
  animation: scan 7s linear infinite;
  pointer-events: none;
  z-index: 9999;
}
@keyframes scan { from{top:0} to{top:100vh} }

/* =============================================
   LAYOUT
   ============================================= */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  width: 100%;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}

/* =============================================
   TOP BAR — instrument cluster style
   ============================================= */
#top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 12px;
  background: #020202;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  height: 34px;
}

#top-bar::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  opacity: 0.4;
}

.tb-group { display:flex; align-items:center; gap:10px; }

.brand {
  font-family: var(--font-d);
  font-size: 11px;
  font-weight: 900;
  color: var(--primary);
  letter-spacing: 3px;
  text-shadow: 0 0 10px var(--glow);
  text-transform: uppercase;
}

/* GPS indicator */
.gps-block { display:flex; align-items:center; gap:5px; }
.gps-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: all 0.3s;
}
.gps-dot.active  { background: var(--primary); box-shadow: 0 0 8px var(--primary); animation: blink 2s infinite; }
.gps-dot.searching { background: var(--warning); box-shadow: 0 0 8px var(--warning); animation: blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.gps-txt {
  font-family: var(--font-vt);
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.gps-txt.active { color: var(--primary); text-shadow: 0 0 6px var(--glow); }

/* Battery */
.bat-block { display:flex; align-items:center; gap:4px; font-family:var(--font-vt); font-size:14px; }
.bat-icon { color: var(--primary); }
.bat-pct  { color: var(--text-dim); font-size:13px; }

/* Ride timer in top bar */
.tb-timer {
  font-family: var(--font-vt);
  font-size: 18px;
  color: var(--primary);
  text-shadow: 0 0 8px var(--glow);
  letter-spacing: 2px;
}

/* Clock */
.tb-clock {
  font-family: var(--font-vt);
  font-size: 18px;
  color: var(--text);
  letter-spacing: 1px;
}

/* =============================================
   MAIN DASHBOARD BODY
   ============================================= */
#dashboard {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* =============================================
   SPEEDOMETER SECTION
   ============================================= */
#speedo-section {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 0 0;
  position: relative;
}

/* Gauge container */
#gauge-wrap {
  position: relative;
  width: min(280px, 76vw);
  height: min(160px, 43vw);
  flex-shrink: 0;
}

#gauge-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

/* Center speed readout */
#gauge-center {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
}

.speed-readout {
  font-family: var(--font-vt);
  font-size: clamp(52px, 15vw, 72px);
  line-height: 1;
  color: var(--primary);
  text-shadow: 0 0 20px var(--primary), 0 0 50px rgba(200,200,200,0.3);
  letter-spacing: 4px;
  transition: color 0.3s, text-shadow 0.3s;
}
.speed-readout.fast {
  color: var(--warning);
  text-shadow: 0 0 20px var(--warning), 0 0 50px rgba(255,176,0,0.4);
}
.speed-readout.sprint {
  color: var(--alert);
  text-shadow: 0 0 20px var(--alert), 0 0 50px rgba(255,64,64,0.4);
}

.speed-unit-lbl {
  font-family: var(--font-vt);
  font-size: 16px;
  color: var(--text-dim);
  letter-spacing: 4px;
  margin-top: -4px;
}

/* =============================================
   STAT GRID + RIDE TIMER PANEL
   ============================================= */
#instr-strip {
  display: flex;
  flex-direction: column;
  width: 100%;
  background: #070707;
  flex-shrink: 0;
  padding: 6px 8px 0;
  gap: 6px;
}

/* 2×2 stat card grid */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}

.stat-card {
  background: #0e0e0e;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 7px 10px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Top glow edge */
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}

.instr-val {
  font-family: var(--font-vt);
  font-size: clamp(22px, 7vw, 32px);
  color: var(--primary);
  text-shadow: 0 0 10px var(--glow-sm);
  line-height: 1;
  letter-spacing: 2px;
}

.instr-lbl {
  font-family: var(--font-m);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 3px;
}

/* Ride Timer block */
#ride-timer-block {
  background: #0e0e0e;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px 7px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.ride-timer-lbl {
  font-family: var(--font-m);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 2.5px;
  text-transform: uppercase;
}

#ride-timer {
  font-family: var(--font-vt);
  font-size: clamp(32px, 10vw, 44px);
  color: var(--primary);
  text-shadow: 0 0 14px var(--glow-sm);
  letter-spacing: 4px;
  line-height: 1;
  text-align: center;
}

.timer-btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.timer-btn {
  border-radius: 3px;
  font-family: var(--font-vt);
  font-size: 16px;
  letter-spacing: 2px;
  padding: 6px 4px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  background: transparent;
}
.timer-btn.go {
  border: 1px solid var(--secondary);
  color: var(--primary);
  box-shadow: 0 0 8px var(--glow-sm), inset 0 0 12px rgba(200,200,200,0.03);
}
.timer-btn.go:active { background: rgba(200,200,200,0.06); }
.timer-btn.stop {
  border: 1px solid rgba(255,64,64,0.45);
  color: var(--alert);
}
.timer-btn.stop:active { background: rgba(255,64,64,0.08); }
.timer-btn:active { transform: scale(0.97); }

/* =============================================
   LOWER SECTION (map + music stacked)
   ============================================= */
#lower-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

/* =============================================
   MINI MAP
   ============================================= */
#minimap-wrap {
  flex: 1;
  min-height: 0;
  position: relative;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  margin: 0;
}

#minimap-inner {
  position: absolute;
  inset: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  background: #060606;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 6px var(--glow-sm);
}

#leaflet-map {
  width: 100%;
  height: 100%;
  background: #060606;
}

.leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) saturate(0.3) brightness(0.7); }
.leaflet-container { background: #060606; }
.leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }

.location-marker {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--primary);
  border: 2px solid white;
  box-shadow: 0 0 0 2px var(--primary), 0 0 12px rgba(200,200,200,0.5);
  animation: mpulse 2s infinite;
}
@keyframes mpulse {
  0%,100% { box-shadow: 0 0 0 2px var(--primary), 0 0 10px rgba(200,200,200,0.4); }
  50%      { box-shadow: 0 0 0 5px rgba(200,200,200,0.12), 0 0 18px rgba(200,200,200,0.2); }
}

/* Map corner decorations */
.map-corner {
  position: absolute;
  width: 8px; height: 8px;
  border-color: var(--primary);
  border-style: solid;
  opacity: 0.6;
  z-index: 410;
  pointer-events: none;
}
.map-corner.tl { top:8px; left:10px;  border-width: 1px 0 0 1px; }
.map-corner.tr { top:8px; right:10px; border-width: 1px 1px 0 0; }
.map-corner.bl { bottom:8px; left:10px;  border-width: 0 0 1px 1px; }
.map-corner.br { bottom:8px; right:10px; border-width: 0 1px 1px 0; }

/* Map labels overlay */
.map-nav-arrow {
  position: absolute;
  top: 10px; left: 50%;
  transform: translateX(-50%);
  z-index: 410;
  font-family: var(--font-vt);
  font-size: 14px;
  color: var(--primary);
  background: rgba(2,2,2,0.8);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 8px;
  letter-spacing: 2px;
  pointer-events: none;
}

.map-center-btn {
  position: absolute;
  bottom: 10px; right: 10px;
  z-index: 410;
  width: 26px; height: 26px;
  background: rgba(2,2,2,0.85);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--primary);
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

/* GPS request overlay on map */
#gps-overlay {
  position: absolute;
  inset: 0;
  background: rgba(5,5,5,0.92);
  z-index: 420;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border-radius: 6px;
}
#gps-overlay h3 {
  font-family: var(--font-vt);
  font-size: 20px;
  color: var(--primary);
  letter-spacing: 2px;
}
#gps-overlay p {
  font-family: var(--font-m);
  font-size: 10px;
  color: var(--text-dim);
  text-align: center;
  padding: 0 16px;
}
.retro-btn {
  background: transparent;
  border: 1px solid var(--primary);
  color: var(--primary);
  font-family: var(--font-vt);
  font-size: 16px;
  letter-spacing: 2px;
  padding: 6px 18px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow: 0 0 10px var(--glow-sm), inset 0 0 10px rgba(200,200,200,0.04);
  transition: all 0.2s;
}
.retro-btn:active { background: rgba(200,200,200,0.08); box-shadow: 0 0 20px var(--glow); }

/* =============================================
   CASSETTE PLAYER
   ============================================= */
#cassette-player {
  flex-shrink: 0;
  background: #040404;
  border-top: 1px solid var(--border);
  padding: 5px 10px 4px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* Cassette header */
.cassette-header {
  display: flex;
  align-items: center;
  gap: 6px;
}

.cassette-icon {
  font-family: var(--font-vt);
  font-size: 16px;
  color: var(--secondary);
  flex-shrink: 0;
}

.cassette-scrollwrap {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.cassette-track-display {
  font-family: var(--font-vt);
  font-size: 15px;
  color: var(--primary);
  text-shadow: 0 0 6px var(--glow-sm);
  white-space: nowrap;
  letter-spacing: 1px;
  animation: marquee 14s linear infinite;
}
@keyframes marquee {
  0%   { transform: translateX(0); }
  40%  { transform: translateX(0); }
  70%  { transform: translateX(-60%); }
  100% { transform: translateX(0); }
}

/* EQ bars */
.eq-bars {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 16px;
  flex-shrink: 0;
}
.eq-bar {
  width: 3px;
  background: var(--primary);
  box-shadow: 0 0 4px var(--glow-sm);
  border-radius: 1px 1px 0 0;
  animation: eq 0.6s ease-in-out infinite alternate;
}
.eq-bar:nth-child(1) { animation-duration: 0.5s; animation-delay: 0s; }
.eq-bar:nth-child(2) { animation-duration: 0.7s; animation-delay: 0.1s; }
.eq-bar:nth-child(3) { animation-duration: 0.4s; animation-delay: 0.05s; }
.eq-bar:nth-child(4) { animation-duration: 0.6s; animation-delay: 0.15s; }
.eq-bar:nth-child(5) { animation-duration: 0.8s; animation-delay: 0.2s; }
@keyframes eq {
  from { height: 3px; opacity: 0.4; }
  to   { height: 14px; opacity: 1; }
}
.eq-bars.paused .eq-bar { animation-play-state: paused; height: 3px; }

/* Cassette progress bar */
.cass-progress-track {
  height: 3px;
  background: rgba(200,200,200,0.08);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
}
.cass-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--dim), var(--primary));
  box-shadow: 0 0 6px var(--glow-sm);
  transition: width 1s linear;
  width: 0%;
}

/* Cassette controls */
.cassette-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 2px 0;
}

.cass-btns {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  width: 100%;
}

.cass-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #888;
  font-size: 20px;
  font-family: var(--font-vt);
  transition: all 0.15s;
  padding: 2px 8px;
  line-height: 1;
}
.cass-btn.play-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--secondary);
  border-radius: 50%;
  color: var(--primary);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 8px var(--glow-sm);
}
.cass-btn:active { transform: scale(0.85); }
.cass-btn.play-btn:active { box-shadow: 0 0 16px var(--glow); }

.music-times {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 3px;
}

.music-time-val {
  font-family: var(--font-vt);
  font-size: 15px;
  color: #999;
  letter-spacing: 1px;
}

/* timer-strip removed — now inside #ride-timer-block as .timer-btn-row */

/* =============================================
   SVG GAUGE STYLES
   ============================================= */
.gauge-arc-bg { fill: none; stroke: #111; stroke-width: 8; }
.gauge-arc-track { fill: none; stroke: #222222; stroke-width: 6; }
.gauge-arc-fill {
  fill: none;
  stroke: var(--primary);
  stroke-width: 6;
  filter: url(#gaugeGlow);
  stroke-linecap: round;
  transition: stroke-dashoffset var(--needle-speed) cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.gauge-arc-fill.warn { stroke: var(--warning); }
.gauge-arc-fill.danger { stroke: var(--alert); }

.tick-major { stroke: var(--dim); stroke-width: 2; }
.tick-minor { stroke: #222222; stroke-width: 1; }
.tick-major.lit { stroke: var(--secondary); }
.tick-label { font-family: var(--font-vt); font-size: 10px; fill: var(--text-dim); text-anchor: middle; dominant-baseline: middle; }
.tick-label.lit { fill: var(--primary); }

/* Needle */
.needle {
  fill: var(--primary);
  filter: url(#needleGlow);
  transition: transform var(--needle-speed) cubic-bezier(0.25, 0.46, 0.45, 0.94);
  transform-origin: 140px 120px;
}
.needle-cap { fill: #111; stroke: var(--primary); stroke-width: 1.5; }

/* =============================================
   PWA BANNER
   ============================================= */
#install-banner {
  position: fixed; bottom:0; left:0; right:0;
  background: #080808;
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  display: none;
  align-items: center;
  gap: 10px;
  z-index: 600;
}
#install-banner.visible { display: flex; }
.install-text strong { font-family: var(--font-vt); font-size: 16px; color: var(--primary); display: block; }
.install-text span   { font-family: var(--font-m); font-size: 10px; color: var(--text-dim); }
.install-btn {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--primary);
  color: var(--primary);
  font-family: var(--font-vt);
  font-size: 15px;
  letter-spacing: 1px;
  cursor: pointer;
}
.install-close { background:none; border:none; color:var(--text-dim); font-size:20px; cursor:pointer; margin-left:auto; }

/* =============================================
   NOTIFICATIONS BADGE
   ============================================= */
.notif-badge-dot {
  position: absolute;
  top: 4px; right: 8px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--alert);
  box-shadow: 0 0 6px var(--alert);
  animation: blink 1.5s infinite;
  display: none;
}
.notif-badge-dot.visible { display: block; }

</style>
</head>
<body>
<div class="scan-line"></div>

<!-- Install Banner -->
<div id="install-banner">
  <div class="install-text">
    <strong>⬇ INSTALL CYCLEPILOT</strong>
    <span>Add to home screen for full experience</span>
  </div>
  <button class="install-btn" id="install-btn">INSTALL</button>
  <button class="install-close" id="install-close">✕</button>
</div>

<div id="app">

  <!-- TOP BAR -->
  <div id="top-bar">
    <div class="tb-group">
      <span class="brand">CYCLE</span>
      <div class="gps-block">
        <div class="gps-dot" id="gps-dot"></div>
        <span class="gps-txt" id="gps-status-text">NO-GPS</span>
      </div>
    </div>
    <div class="tb-group">
      <span class="tb-timer" id="tb-timer">00:00:00</span>
    </div>
    <div class="tb-group">
      <div class="bat-block">
        <span class="bat-icon">▮▮▮</span>
        <span class="bat-pct" id="bat-pct">--</span>
      </div>
      <span class="tb-clock" id="clock">00:00</span>
      <span class="notif-badge-dot" id="notif-dot"></span>
    </div>
  </div>

  <!-- DASHBOARD BODY -->
  <div id="dashboard">

    <!-- ======= SPEEDOMETER ======= -->
    <div id="speedo-section">

      <div id="gauge-wrap">
        <svg id="gauge-svg" viewBox="0 0 280 145" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="gaugeGlow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="needleGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Gauge background arc -->
          <path id="gauge-bg" class="gauge-arc-bg" d=""/>
          <!-- Track arc -->
          <path id="gauge-track" class="gauge-arc-track" d=""/>
          <!-- Fill arc -->
          <path id="gauge-fill" class="gauge-arc-fill" d=""/>

          <!-- Tick marks + labels rendered by JS -->
          <g id="ticks-group"></g>

          <!-- Needle -->
          <g id="needle-group">
            <polygon id="gauge-needle" class="needle"
              points="140,42 136,118 140,122 144,118"
              style="transform: rotate(-135deg)"/>
            <circle class="needle-cap" cx="140" cy="120" r="6"/>
          </g>
        </svg>

        <!-- Center speed display -->
        <div id="gauge-center">
          <div class="speed-readout" id="speed-display">0</div>
          <div class="speed-unit-lbl">KM/H</div>
        </div>
      </div>

    </div>

    <!-- ======= STAT GRID + RIDE TIMER ======= -->
    <div id="instr-strip">

      <!-- 2×2 Stat Cards -->
      <div class="stat-grid">
        <div class="stat-card">
          <div class="instr-val" id="avg-speed-display">0.0</div>
          <div class="instr-lbl">AVG KM/H</div>
        </div>
        <div class="stat-card">
          <div class="instr-val" id="max-speed-display">0.0</div>
          <div class="instr-lbl">MAX KM/H</div>
        </div>
        <div class="stat-card">
          <div class="instr-val" id="distance-display">0.00</div>
          <div class="instr-lbl">KM</div>
        </div>
        <div class="stat-card">
          <div class="instr-val" id="elevation-display">0</div>
          <div class="instr-lbl">ALT M</div>
        </div>
      </div>

      <!-- Ride Timer Block -->
      <div id="ride-timer-block">
        <div class="ride-timer-lbl">RIDE TIMER</div>
        <div id="ride-timer">00:00:00</div>
        <div class="timer-btn-row">
          <button class="timer-btn go" id="timer-toggle-btn">
            <span id="timer-label">▶ START</span>
          </button>
          <button class="timer-btn stop" id="timer-reset-btn">■ RESET</button>
        </div>
      </div>

    </div>

    <!-- ======= LOWER SECTION ======= -->
    <div id="lower-section">

      <!-- MINI MAP (middle) -->
      <div id="minimap-wrap">
        <div id="minimap-inner">
          <div id="leaflet-map"></div>
          <div class="map-corner tl"></div>
          <div class="map-corner tr"></div>
          <div class="map-corner bl"></div>
          <div class="map-corner br"></div>
          <div class="map-nav-arrow" id="map-label">▲ TRACKING</div>
          <button class="map-center-btn" id="center-map-btn">⊕</button>

          <!-- GPS overlay -->
          <div id="gps-overlay">
            <h3>▸ GPS OFFLINE</h3>
            <p>Tap to enable location tracking</p>
            <button class="retro-btn" id="start-gps-btn">ACQUIRE SIGNAL</button>
          </div>
        </div>
      </div>

      <!-- CASSETTE PLAYER (bottom) -->
      <div id="cassette-player">

        <!-- Track info + EQ -->
        <div class="cassette-header">
          <span class="cassette-icon">♫</span>
          <div class="cassette-scrollwrap">
            <div class="cassette-track-display" id="cass-track-display">CYCLING FLOW VOL.1 · BPM RIDERS</div>
          </div>
          <div class="eq-bars paused" id="eq-bars">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
          </div>
        </div>

        <!-- Times row -->
        <div class="music-times">
          <span id="current-time" class="music-time-val">0:00</span>
          <span id="total-time" class="music-time-val">3:42</span>
        </div>

        <!-- Progress -->
        <div class="cass-progress-track" id="progress-track">
          <div class="cass-progress-fill" id="progress-fill"></div>
        </div>

        <!-- Controls centered below -->
        <div class="cassette-controls">
          <div class="cass-btns">
            <button class="cass-btn" id="prev-btn">⏮</button>
            <button class="cass-btn play-btn" id="play-btn">▶</button>
            <button class="cass-btn" id="next-btn">⏭</button>
          </div>
        </div>

      </div>

    </div>

  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* =============================================
   CYCLEPILOT — Retro Digital Dashboard
   ============================================= */

// =============================================
// STATE
// =============================================
const state = {
  gps: { active: false, lat: null, lng: null, altitude: 0 },
  ride: {
    speed: 0, maxSpeed: 0, avgSpeed: 0, distance: 0,
    speedReadings: [], timerRunning: false, timerSeconds: 0,
    lastPosition: null, zoneTime: { slow:0, cruise:0, fast:0, sprint:0 }
  },
  music: { playing: false, currentTrack: 0, progressSeconds: 0 },
  map: { instance: null, marker: null, trail: null, trailPoints: [], following: true },
  notifications: [],
  needle: { current: -135, target: -135 }
};

const SPEED_MAX = 60;

// =============================================
// PLAYLIST DATA
// =============================================
const playlist = [
  { title: 'CYCLING FLOW VOL.1', artist: 'BPM RIDERS',      duration: 222, genre: 'ELECTRONIC' },
  { title: 'MOUNTAIN ASCENT',    artist: 'PEAK WARRIORS',   duration: 318, genre: 'ROCK' },
  { title: 'VELOCITY RUSH',      artist: 'CIRCUIT BREAKERS',duration: 198, genre: 'TECHNO' },
  { title: 'WIND & ROAD',        artist: 'OPEN HIGHWAY',    duration: 256, genre: 'AMBIENT' },
  { title: 'SPRINT FINALE',      artist: 'ENDURANCE LABS',  duration: 174, genre: 'EDM' },
  { title: 'CADENCE NATION',     artist: 'VELODROME FC',    duration: 289, genre: 'HIP-HOP' },
  { title: 'FIXED GEAR DREAMS',  artist: 'URBAN FIXIE',     duration: 241, genre: 'LO-FI' }
];

// =============================================
// SAMPLE NOTIFICATIONS
// =============================================
const sampleNotifications = [
  { id:1, unread:true  },
  { id:2, unread:true  },
  { id:3, unread:true  },
  { id:4, unread:false },
  { id:5, unread:false }
];

// =============================================
// CLOCK + BATTERY
// =============================================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}
setInterval(updateClock, 1000);
updateClock();

function updateBattery() {
  if (!navigator.getBattery) { document.getElementById('bat-pct').textContent = ''; return; }
  navigator.getBattery().then(b => {
    const pct = Math.round(b.level * 100);
    document.getElementById('bat-pct').textContent = pct + '%';
  }).catch(()=>{});
}
updateBattery();
setInterval(updateBattery, 60000);

// =============================================
// GAUGE — SVG arc + needle
// =============================================
const CX = 140, CY = 120, R = 110;
const START_ANG = -135 * Math.PI / 180;  // degrees from top
const END_ANG   =  -45 * Math.PI / 180;

function polar(cx, cy, r, deg) {
  const rad = deg * Math.PI / 180;
  return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
}

function arcPath(r, startDeg, endDeg) {
  const s = polar(CX, CY, r, startDeg);
  const e = polar(CX, CY, r, endDeg);
  const large = (endDeg - startDeg) > 180 ? 1 : 0;
  return `M ${s[0]} ${s[1]} A ${r} ${r} 0 ${large} 1 ${e[0]} ${e[1]}`;
}

// Speed 0–60 maps to angle -135° to +45° (sweep 180°)
function speedToAngle(spd) {
  const clamped = Math.max(0, Math.min(SPEED_MAX, spd));
  return -135 + (clamped / SPEED_MAX) * 180;
}

function buildGauge() {
  const bgEl = document.getElementById('gauge-bg');
  const trackEl = document.getElementById('gauge-track');
  bgEl.setAttribute('d', arcPath(R+2, -135, 45));
  trackEl.setAttribute('d', arcPath(R, -135, 45));

  // Tick marks
  const tg = document.getElementById('ticks-group');
  tg.innerHTML = '';

  for (let spd = 0; spd <= SPEED_MAX; spd += 5) {
    const ang = speedToAngle(spd);
    const isMajor = (spd % 10 === 0);
    const r1 = R - 2;
    const r2 = isMajor ? R - 14 : R - 8;
    const [x1,y1] = polar(CX, CY, r1, ang);
    const [x2,y2] = polar(CX, CY, r2, ang);

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('class', isMajor ? 'tick-major' : 'tick-minor');
    tg.appendChild(line);

    if (isMajor) {
      const [lx,ly] = polar(CX, CY, R - 22, ang);
      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x', lx); text.setAttribute('y', ly);
      text.setAttribute('class', 'tick-label');
      text.textContent = spd;
      tg.appendChild(text);
    }
  }

  updateGaugeArc(0);
}

function updateGaugeArc(spd) {
  const fillEl = document.getElementById('gauge-fill');
  const ang = speedToAngle(spd);

  fillEl.setAttribute('d', arcPath(R, -135, ang));

  // Color by speed zone
  fillEl.className.baseVal = 'gauge-arc-fill' +
    (spd > 45 ? ' danger' : spd > 30 ? ' warn' : '');

  // Update tick glow
  document.querySelectorAll('.tick-major').forEach((el, i) => {
    const tickSpd = i * 10;
    el.classList.toggle('lit', tickSpd <= spd);
  });
  document.querySelectorAll('.tick-label').forEach((el, i) => {
    const tickSpd = i * 10;
    el.classList.toggle('lit', tickSpd <= spd);
  });
}

// Smooth needle with inertia
let needleAnimFrame;
function animateNeedle(targetDeg) {
  cancelAnimationFrame(needleAnimFrame);
  const needle = document.getElementById('gauge-needle');
  const current = state.needle.current;
  const diff = targetDeg - current;
  const step = diff * 0.12 + (diff > 0 ? 0.5 : -0.5);
  const next = Math.abs(diff) < 0.5 ? targetDeg : current + step;
  state.needle.current = next;
  needle.style.transform = `rotate(${next}deg)`;
  if (Math.abs(diff) > 0.5) {
    needleAnimFrame = requestAnimationFrame(() => animateNeedle(targetDeg));
  }
}

// =============================================
// GPS
// =============================================
function setupGPS() {
  document.getElementById('start-gps-btn').addEventListener('click', requestGPS);
}

function requestGPS() {
  if (!navigator.geolocation) { startGPSSimulation(); return; }
  document.getElementById('gps-dot').classList.add('searching');
  document.getElementById('gps-status-text').textContent = 'SEARCHING';
  navigator.geolocation.watchPosition(onGPSSuccess, onGPSError,
    { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 });
}

function onGPSSuccess(pos) {
  const { latitude:lat, longitude:lng, speed, altitude, accuracy } = pos.coords;
  state.gps = { active:true, lat, lng, altitude: altitude ? Math.round(altitude) : 0 };

  const dot = document.getElementById('gps-dot');
  dot.classList.remove('searching');
  dot.classList.add('active');
  const gps_txt = document.getElementById('gps-status-text');
  gps_txt.textContent = `±${Math.round(accuracy)}M`;
  gps_txt.classList.add('active');

  document.getElementById('gps-overlay').style.display = 'none';

  const kmh = speed != null ? speed * 3.6 : 0;
  if (state.ride.lastPosition) {
    const d = haversine(state.ride.lastPosition.lat, state.ride.lastPosition.lng, lat, lng);
    if (d < 0.5) state.ride.distance += d;
  }
  state.ride.lastPosition = {lat, lng};
  state.ride.speed = kmh;
  if (kmh > state.ride.maxSpeed) state.ride.maxSpeed = kmh;
  if (state.ride.timerRunning && kmh > 0) {
    state.ride.speedReadings.push(kmh);
    state.ride.avgSpeed = state.ride.speedReadings.reduce((a,b)=>a+b,0) / state.ride.speedReadings.length;
  }
  updateSpeedDisplays();
  if (state.map.instance) updateMapLocation(lat, lng);
}

function onGPSError() {
  document.getElementById('gps-dot').classList.remove('searching', 'active');
  document.getElementById('gps-status-text').textContent = 'DEMO';
  startGPSSimulation();
}

function startGPSSimulation() {
  let lat = 14.5995, lng = 120.9842, spd = 0, angle = 0;
  document.getElementById('gps-overlay').style.display = 'none';
  document.getElementById('gps-dot').classList.add('active');
  const gt = document.getElementById('gps-status-text');
  gt.textContent = 'DEMO';
  gt.classList.add('active');

  setInterval(() => {
    spd = Math.max(0, Math.min(45, spd + (Math.random()-0.45)*3));
    angle += (Math.random()-0.5)*0.08;
    lat += Math.cos(angle) * 0.00003;
    lng += Math.sin(angle) * 0.00003;
    state.gps.lat = lat; state.gps.lng = lng;
    state.ride.speed = spd;
    if (spd > state.ride.maxSpeed) state.ride.maxSpeed = spd;
    state.ride.distance += spd * (1/3600) * 0.05;
    if (state.ride.timerRunning && spd > 0) {
      state.ride.speedReadings.push(spd);
      state.ride.avgSpeed = state.ride.speedReadings.reduce((a,b)=>a+b,0) / state.ride.speedReadings.length;
    }
    updateSpeedDisplays();
    if (state.map.instance) updateMapLocation(lat, lng);
  }, 1000);
}

function haversine(la1, lo1, la2, lo2) {
  const R=6371, d2r=Math.PI/180;
  const dlat=(la2-la1)*d2r, dlon=(lo2-lo1)*d2r;
  const a=Math.sin(dlat/2)**2+Math.cos(la1*d2r)*Math.cos(la2*d2r)*Math.sin(dlon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// =============================================
// SPEED DISPLAYS
// =============================================
function updateSpeedDisplays() {
  const { speed, maxSpeed, avgSpeed, distance } = state.ride;
  const s = speed.toFixed(1);
  const sRnd = Math.round(speed);

  // Speed readout
  const el = document.getElementById('speed-display');
  el.textContent = sRnd;
  el.className = 'speed-readout' + (speed > 40 ? ' sprint' : speed > 25 ? ' fast' : '');

  // Gauge needle + arc
  const targetDeg = speedToAngle(speed);
  animateNeedle(targetDeg);
  updateGaugeArc(speed);

  // Instrument strip
  document.getElementById('avg-speed-display').textContent = avgSpeed.toFixed(1);
  document.getElementById('max-speed-display').textContent = maxSpeed.toFixed(1);
  document.getElementById('distance-display').textContent  = distance.toFixed(2);
  document.getElementById('elevation-display').textContent = state.gps.altitude;

  // Map badge
  if (document.getElementById('map-label')) {
    document.getElementById('map-label').textContent = `▲ ${sRnd} KM/H`;
  }
}

// =============================================
// MAP
// =============================================
function initMap() {
  if (state.map.instance) return;
  const lat = state.gps.lat || 14.5995;
  const lng = state.gps.lng || 120.9842;

  const map = L.map('leaflet-map', { center:[lat,lng], zoom:16, zoomControl:false, attributionControl:false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);

  const marker = L.marker([lat,lng], {
    icon: L.divIcon({ html:'<div class="location-marker"></div>', iconSize:[14,14], iconAnchor:[7,7], className:'' })
  }).addTo(map);

  const trail = L.polyline([], { color:'#A0A0A0', weight:2, opacity:0.7 }).addTo(map);

  state.map.instance = map;
  state.map.marker = marker;
  state.map.trail = trail;

  document.getElementById('center-map-btn').addEventListener('click', () => {
    state.map.following = true;
    if (state.gps.lat) map.setView([state.gps.lat, state.gps.lng], 16);
  });

  map.on('dragstart', () => { state.map.following = false; });
}

function updateMapLocation(lat, lng) {
  if (!state.map.instance) return;
  state.map.marker.setLatLng([lat, lng]);
  state.map.trailPoints.push([lat, lng]);
  if (state.map.trailPoints.length > 500) state.map.trailPoints = state.map.trailPoints.slice(-500);
  state.map.trail.setLatLngs(state.map.trailPoints);
  if (state.map.following) state.map.instance.panTo([lat, lng], { animate:true, duration:0.5 });
}

// =============================================
// TIMER
// =============================================
function setupTimer() {
  let iv = null;

  document.getElementById('timer-toggle-btn').addEventListener('click', () => {
    state.ride.timerRunning = !state.ride.timerRunning;
    document.getElementById('timer-label').textContent =
      state.ride.timerRunning ? '⏸ PAUSE' : '▶ START';

    if (state.ride.timerRunning) {
      if (!state.gps.active) requestGPS();
      iv = setInterval(() => {
        state.ride.timerSeconds++;
        const t = formatTime(state.ride.timerSeconds);
        document.getElementById('ride-timer').textContent = t;
        document.getElementById('tb-timer').textContent = t;
      }, 1000);
    } else {
      clearInterval(iv);
    }
  });

  document.getElementById('timer-reset-btn').addEventListener('click', () => {
    state.ride.timerRunning = false;
    state.ride.timerSeconds = 0;
    state.ride.speedReadings = [];
    state.ride.avgSpeed = 0;
    state.ride.distance = 0;
    state.ride.maxSpeed = 0;
    clearInterval(iv);
    document.getElementById('timer-label').textContent = '▶ START';
    document.getElementById('ride-timer').textContent = '00:00:00';
    document.getElementById('tb-timer').textContent = '00:00:00';
    updateSpeedDisplays();
  });
}

function formatTime(s) {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// =============================================
// MUSIC
// =============================================
function setupMusic() {
  loadTrack(0);
  document.getElementById('play-btn').addEventListener('click', togglePlay);
  document.getElementById('prev-btn').addEventListener('click', prevTrack);
  document.getElementById('next-btn').addEventListener('click', nextTrack);
  document.getElementById('progress-track').addEventListener('click', e => {
    const rect = e.target.getBoundingClientRect();
    state.music.progressSeconds = Math.floor(((e.clientX-rect.left)/rect.width)*playlist[state.music.currentTrack].duration);
    updateProgress();
  });
  setInterval(() => {
    if (!state.music.playing) return;
    state.music.progressSeconds++;
    if (state.music.progressSeconds >= playlist[state.music.currentTrack].duration) nextTrack();
    else updateProgress();
  }, 1000);
}

function loadTrack(i) {
  state.music.currentTrack = i;
  state.music.progressSeconds = 0;
  const t = playlist[i];
  document.getElementById('cass-track-display').textContent = `${t.title} · ${t.artist}`;
  document.getElementById('total-time').textContent = fmtDur(t.duration);
  updateProgress();
}

function togglePlay() {
  state.music.playing = !state.music.playing;
  document.getElementById('play-btn').textContent = state.music.playing ? '⏸' : '▶';
  document.getElementById('eq-bars').classList.toggle('paused', !state.music.playing);
}

function prevTrack() {
  loadTrack((state.music.currentTrack - 1 + playlist.length) % playlist.length);
  if (!state.music.playing) togglePlay();
}
function nextTrack() {
  loadTrack((state.music.currentTrack + 1) % playlist.length);
  if (!state.music.playing) togglePlay();
}

function updateProgress() {
  const dur = playlist[state.music.currentTrack].duration;
  document.getElementById('progress-fill').style.width = `${(state.music.progressSeconds/dur)*100}%`;
  document.getElementById('current-time').textContent = fmtDur(state.music.progressSeconds);
}

function fmtDur(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

// =============================================
// NOTIFICATIONS BADGE
// =============================================
function setupNotifications() {
  state.notifications = [...sampleNotifications];
  const count = state.notifications.filter(n=>n.unread).length;
  if (count > 0) document.getElementById('notif-dot').classList.add('visible');
}

// =============================================
// PWA
// =============================================
function setupPWA() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW:', r.scope))
      .catch(e => console.warn('SW fail:', e));
  }
  let deferred = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferred = e;
    document.getElementById('install-banner').classList.add('visible');
  });
  document.getElementById('install-btn').addEventListener('click', async () => {
    if (deferred) { deferred.prompt(); await deferred.userChoice; deferred = null; }
    document.getElementById('install-banner').classList.remove('visible');
  });
  document.getElementById('install-close').addEventListener('click', () => {
    document.getElementById('install-banner').classList.remove('visible');
  });
  if (!window.matchMedia('(display-mode: standalone)').matches) {
    setTimeout(() => {
      document.getElementById('install-banner').classList.add('visible');
      setTimeout(() => document.getElementById('install-banner').classList.remove('visible'), 8000);
    }, 5000);
  }
}

// =============================================
// WAKE LOCK
// =============================================
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}

// =============================================
// INIT
// =============================================
function init() {
  buildGauge();
  initMap();
  setupGPS();
  setupTimer();
  setupMusic();
  setupNotifications();
  setupPWA();
  requestWakeLock();

  document.addEventListener('contextmenu', e => e.preventDefault());
  let lastTap = 0;
  document.addEventListener('touchend', e => {
    if (Date.now()-lastTap < 300) e.preventDefault();
    lastTap = Date.now();
  }, { passive:false });

  console.log('🚴 CyclePilot Retro ready');
}

document.addEventListener('DOMContentLoaded', init);
</script>
